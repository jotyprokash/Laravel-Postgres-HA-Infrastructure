# PostgreSQL 16 - Optimized for High Write Throughput (100K/s target)
# See documentation/database_optimization.md for detailed reasoning

listen_addresses = '*'
port = 5432

# --- Connections ---
max_connections = 500

# --- Memory ---
shared_buffers = 4GB
work_mem = 16MB
maintenance_work_mem = 512MB
effective_cache_size = 12GB

# --- WAL & Replication ---
wal_level = replica
wal_buffers = 16MB
max_wal_size = 4GB
min_wal_size = 1GB
max_wal_senders = 10
wal_keep_size = 1GB
hot_standby = on

# --- Write Performance ---
synchronous_commit = off
commit_delay = 1000
commit_siblings = 5
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# --- Autovacuum ---
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.025

# --- Logging ---
log_min_duration_statement = 500
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# --- Repmgr ---
shared_preload_libraries = 'repmgr'
